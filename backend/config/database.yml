default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "root" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 3306 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "household_account_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "household_account_test" } %>

production:
  <<: *default
  database: household_account_production
