<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿アプリ プロトタイプ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f5f6fa;
      color: #333;
      min-height: 100vh;
    }

    /* ===== ナビゲーション ===== */
    nav {
      background: #3a7bd5;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    nav .logo { font-size: 18px; font-weight: 700; }
    nav .nav-links { display: flex; gap: 8px; }
    nav .nav-links button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    nav .nav-links button:hover,
    nav .nav-links button.active { background: rgba(255,255,255,0.2); color: #fff; }

    /* ===== ページ共通 ===== */
    .page { display: none; padding-top: 72px; min-height: 100vh; }
    .page.active { display: block; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }

    /* ===== 認証画面 ===== */
    .auth-page {
      display: none;
      min-height: 100vh;
      background: #3a7bd5;
      align-items: center;
      justify-content: center;
    }
    .auth-page.active { display: flex; }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .auth-card h1 { text-align: center; color: #3a7bd5; font-size: 22px; margin-bottom: 28px; }
    .auth-card label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 16px; }
    .auth-card input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border 0.15s;
    }
    .auth-card input:focus { border-color: #3a7bd5; }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2e6ac0; }
    .auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
    .auth-link a { color: #3a7bd5; text-decoration: none; cursor: pointer; }
    .auth-link a:hover { text-decoration: underline; }

    /* ===== 月ナビ ===== */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .month-nav button {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: #eef2ff; }
    .month-nav .month-label { font-size: 18px; font-weight: 700; min-width: 120px; text-align: center; }

    /* ===== サマリー ===== */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .summary-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .summary-card .amount { font-size: 22px; font-weight: 700; }
    .summary-card.income .amount { color: #2ecc71; }
    .summary-card.expense .amount { color: #e74c3c; }
    .summary-card.balance .amount { color: #3a7bd5; }

    /* ===== ホーム レイアウト ===== */
    .home-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ===== カレンダー ===== */
    .calendar-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
      user-select: none;
    }
    .calendar-header {
      background: #3a7bd5;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }
    .calendar-grid {
      padding: 10px;
    }
    .calendar-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .calendar-dow span {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      padding: 4px 0;
    }
    .calendar-dow span:first-child { color: #e74c3c; }
    .calendar-dow span:last-child  { color: #3a7bd5; }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      text-align: center;
      font-size: 13px;
      padding: 6px 2px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      min-height: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .cal-day:hover { background: #eef2ff; }
    .cal-day.other-month { color: #ccc; }
    .cal-day.today { font-weight: 700; color: #3a7bd5; }
    .cal-day.selected { background: #3a7bd5 !important; color: #fff !important; border-radius: 6px; }
    .cal-day.has-data::after {
      content: '';
      display: block;
      width: 5px; height: 5px;
      background: #e74c3c;
      border-radius: 50%;
      margin-top: 2px;
    }
    .cal-day.selected.has-data::after { background: #fff; }
    .cal-day.sun { color: #e74c3c; }
    .cal-day.sat { color: #3a7bd5; }
    .cal-day.selected { color: #fff !important; }
    .calendar-legend {
      padding: 8px 12px 10px;
      font-size: 11px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
      border-top: 1px solid #f0f0f0;
    }
    .calendar-legend::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: #e74c3c;
      border-radius: 50%;
    }
    .day-filter-badge {
      display: inline-block;
      background: #eef2ff;
      color: #3a7bd5;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
      border: 1px solid #c7d2fe;
      transition: background 0.1s;
    }
    .day-filter-badge:hover { background: #e0e7ff; }

    /* ===== テーブル ===== */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8f9ff;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      color: #888;
      font-weight: 600;
      border-bottom: 1px solid #eee;
    }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: #f5f7ff; }
    tbody td {
      padding: 13px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    tbody tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.income { background: #e8f8f0; color: #2ecc71; }
    .badge.expense { background: #fef0f0; color: #e74c3c; }
    .amount-cell.income { color: #2ecc71; font-weight: 600; }
    .amount-cell.expense { color: #e74c3c; font-weight: 600; }

    .table-footer {
      padding: 16px;
      text-align: right;
      border-top: 1px solid #f0f0f0;
    }
    .btn-add {
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #2e6ac0; }

    /* ===== モーダル共通 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 460px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #3a7bd5; }
    .radio-group { display: flex; gap: 24px; }
    .radio-group label {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: #333; font-weight: normal;
      cursor: pointer;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .modal-actions-edit { display: flex; justify-content: space-between; margin-top: 20px; }
    .btn-cancel {
      background: #fff;
      border: 1px solid #ddd;
      color: #666;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-save {
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #2e6ac0; }
    .btn-delete {
      background: #fff;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #fef0f0; }

    /* ===== 電卓UI ===== */
    .amount-input-wrap {
      position: relative;
    }
    .amount-display {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 20px;
      font-weight: 700;
      text-align: right;
      cursor: pointer;
      background: #f8f9ff;
      color: #333;
      transition: border 0.15s;
      min-height: 44px;
    }
    .amount-display:hover, .amount-display.open { border-color: #3a7bd5; background: #fff; }
    .calc-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #aaa;
    }
    .calculator {
      display: none;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-top: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .calculator.open { display: block; }
    .calc-expr {
      text-align: right;
      font-size: 12px;
      color: #aaa;
      min-height: 18px;
      margin-bottom: 2px;
      padding-right: 4px;
    }
    .calc-result {
      text-align: right;
      font-size: 22px;
      font-weight: 700;
      color: #333;
      padding: 4px 4px 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 10px;
      min-height: 38px;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .calc-btn {
      padding: 0;
      height: 46px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.1s, transform 0.08s;
      display: flex; align-items: center; justify-content: center;
    }
    .calc-btn:active { transform: scale(0.93); }
    .calc-btn.num  { background: #f0f2f8; color: #333; }
    .calc-btn.num:hover  { background: #e4e8f5; }
    .calc-btn.op   { background: #eef2ff; color: #3a7bd5; }
    .calc-btn.op:hover   { background: #dde5ff; }
    .calc-btn.clear { background: #fff0f0; color: #e74c3c; }
    .calc-btn.clear:hover { background: #fde2e2; }
    .calc-btn.eq   { background: #3a7bd5; color: #fff; grid-row: span 2; height: 100%; }
    .calc-btn.eq:hover   { background: #2e6ac0; }
    .calc-btn.zero { grid-column: span 2; }
    .calc-btn.back { background: #fff8e8; color: #f39c12; }
    .calc-btn.back:hover { background: #fef0c8; }
    .calc-confirm {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .calc-confirm:hover { background: #2e6ac0; }

    /* ===== レポート ===== */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }
    .report-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .report-card h3 { font-size: 15px; color: #666; margin-bottom: 16px; font-weight: 600; }
    .chart-container { position: relative; height: 240px; }

    /* ===== カテゴリ管理 ===== */
    .category-section { margin-bottom: 28px; }
    .category-section h3 {
      font-size: 15px; font-weight: 700; color: #555;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 2px solid #eef2ff;
    }
    .category-list { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .category-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .category-item:last-child { border-bottom: none; }
    .category-actions { display: flex; gap: 8px; }
    .btn-sm {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sm.edit { background: #eef2ff; border: 1px solid #c7d2fe; color: #4f46e5; }
    .btn-sm.edit:hover { background: #e0e7ff; }
    .btn-sm.del { background: #fef0f0; border: 1px solid #fecaca; color: #e74c3c; }
    .btn-sm.del:hover { background: #fee2e2; }
    .category-add {
      display: flex; gap: 8px;
      padding: 12px 16px;
      background: #f8f9ff;
      border-top: 1px solid #eee;
    }
    .category-add input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .category-add input:focus { border-color: #3a7bd5; }
    .category-add button {
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #333; }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="page-login" class="auth-page active">
  <div class="auth-card">
    <h1>家計簿アプリ</h1>
    <label>メールアドレス</label>
    <input type="email" placeholder="example@email.com">
    <label>パスワード</label>
    <input type="password" placeholder="••••••••">
    <button class="btn-primary" onclick="goTo('home')">ログイン</button>
    <p class="auth-link">アカウントをお持ちでない方は <a onclick="goTo('signup')">新規登録はこちら</a></p>
  </div>
</div>

<!-- ===== 新規登録画面 ===== -->
<div id="page-signup" class="auth-page">
  <div class="auth-card">
    <h1>家計簿アプリ</h1>
    <label>メールアドレス</label>
    <input type="email" placeholder="example@email.com">
    <label>パスワード（8文字以上）</label>
    <input type="password" placeholder="••••••••">
    <button class="btn-primary" onclick="goTo('home')">登録する</button>
    <p class="auth-link">すでにアカウントをお持ちの方は <a onclick="goTo('login')">ログインはこちら</a></p>
  </div>
</div>

<!-- ===== ナビゲーション（ログイン後） ===== -->
<nav id="main-nav" style="display:none;">
  <span class="logo">家計簿アプリ</span>
  <div class="nav-links">
    <button id="nav-home" onclick="goTo('home')">ホーム</button>
    <button id="nav-reports" onclick="goTo('reports')">レポート</button>
    <button id="nav-categories" onclick="goTo('categories')">カテゴリ</button>
    <button onclick="goTo('login')">ログアウト</button>
  </div>
</nav>

<!-- ===== ホーム画面 ===== -->
<div id="page-home" class="page">
  <div class="container">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="summary-cards">
      <div class="summary-card income">
        <div class="label">収入合計</div>
        <div class="amount" id="summary-income"></div>
      </div>
      <div class="summary-card expense">
        <div class="label">支出合計</div>
        <div class="amount" id="summary-expense"></div>
      </div>
      <div class="summary-card balance">
        <div class="label">残高</div>
        <div class="amount" id="summary-balance"></div>
      </div>
    </div>
    <div class="home-layout">
      <!-- カレンダー -->
      <div class="calendar-card">
        <div class="calendar-header" id="cal-header"></div>
        <div class="calendar-grid">
          <div class="calendar-dow">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <div class="calendar-days" id="cal-days"></div>
        </div>
        <div class="calendar-legend">収支データあり</div>
      </div>
      <!-- 収支テーブル -->
      <div>
        <div style="display:flex;align-items:center;margin-bottom:10px;min-height:28px;">
          <span id="list-title" style="font-size:14px;font-weight:700;color:#555;"></span>
          <span id="day-filter-clear" class="day-filter-badge" style="display:none;" onclick="clearDayFilter()">✕ 絞り込み解除</span>
        </div>
        <div class="card">
          <table>
            <thead>
              <tr>
                <th>日付</th><th>種別</th><th>カテゴリ</th><th>金額</th><th>メモ</th>
              </tr>
            </thead>
            <tbody id="transaction-list"></tbody>
          </table>
          <div class="table-footer">
            <button class="btn-add" onclick="openAddModal()">＋ 収支を追加する</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== レポート画面 ===== -->
<div id="page-reports" class="page">
  <div class="container">
    <div class="month-nav">
      <button onclick="changeMonth(-1); renderReports()">&#8249;</button>
      <span class="month-label" id="report-month-label"></span>
      <button onclick="changeMonth(1); renderReports()">&#8250;</button>
    </div>
    <div class="report-grid">
      <div class="report-card">
        <h3>支出カテゴリ別</h3>
        <div class="chart-container"><canvas id="pie-chart"></canvas></div>
      </div>
      <div class="report-card">
        <h3>月別収支推移（過去6ヶ月）</h3>
        <div class="chart-container"><canvas id="bar-chart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== カテゴリ管理画面 ===== -->
<div id="page-categories" class="page">
  <div class="container">
    <p class="page-title">カテゴリ管理</p>
    <div class="category-section">
      <h3>支出カテゴリ</h3>
      <div class="category-list" id="expense-category-list"></div>
    </div>
    <div class="category-section">
      <h3>収入カテゴリ</h3>
      <div class="category-list" id="income-category-list"></div>
    </div>
  </div>
</div>

<!-- ===== 収支登録・編集モーダル ===== -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">収支を登録する</h2>

    <div class="form-group">
      <label>種別</label>
      <div class="radio-group">
        <label><input type="radio" name="type" value="income"  id="radio-income"  onchange="updateCategoryOptions()"> 収入</label>
        <label><input type="radio" name="type" value="expense" id="radio-expense" checked onchange="updateCategoryOptions()"> 支出</label>
      </div>
    </div>

    <!-- 電卓UI -->
    <div class="form-group">
      <label>金額 <span style="color:#e74c3c">*</span></label>
      <div class="amount-input-wrap">
        <div class="amount-display" id="amount-display" onclick="toggleCalc()">0</div>
        <button class="calc-toggle-btn" onclick="toggleCalc()" tabindex="-1">🔢</button>
      </div>
      <div class="calculator" id="calculator">
        <div class="calc-expr" id="calc-expr"></div>
        <div class="calc-result" id="calc-result">0</div>
        <div class="calc-grid">
          <button class="calc-btn clear" onclick="calcClear()">C</button>
          <button class="calc-btn back"  onclick="calcBack()">⌫</button>
          <button class="calc-btn op"    onclick="calcOp('%')">%</button>
          <button class="calc-btn op"    onclick="calcOp('÷')">÷</button>

          <button class="calc-btn num"   onclick="calcNum('7')">7</button>
          <button class="calc-btn num"   onclick="calcNum('8')">8</button>
          <button class="calc-btn num"   onclick="calcNum('9')">9</button>
          <button class="calc-btn op"    onclick="calcOp('×')">×</button>

          <button class="calc-btn num"   onclick="calcNum('4')">4</button>
          <button class="calc-btn num"   onclick="calcNum('5')">5</button>
          <button class="calc-btn num"   onclick="calcNum('6')">6</button>
          <button class="calc-btn op"    onclick="calcOp('−')">−</button>

          <button class="calc-btn num"   onclick="calcNum('1')">1</button>
          <button class="calc-btn num"   onclick="calcNum('2')">2</button>
          <button class="calc-btn num"   onclick="calcNum('3')">3</button>
          <button class="calc-btn op"    onclick="calcOp('+')">+</button>

          <button class="calc-btn num zero" onclick="calcNum('0')">0</button>
          <button class="calc-btn num"   onclick="calcNum('00')">00</button>
          <button class="calc-btn eq"    onclick="calcEqual()">=</button>
        </div>
        <button class="calc-confirm" onclick="confirmAmount()">この金額を使う</button>
      </div>
    </div>

    <div class="form-group">
      <label>カテゴリ <span style="color:#e74c3c">*</span></label>
      <select id="input-category"></select>
    </div>
    <div class="form-group">
      <label>日付 <span style="color:#e74c3c">*</span></label>
      <input type="date" id="input-date">
    </div>
    <div class="form-group">
      <label>メモ（任意）</label>
      <input type="text" id="input-memo" placeholder="例: ランチ代" maxlength="200">
    </div>

    <div id="modal-actions-add" class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveTransaction()">登録する</button>
    </div>
    <div id="modal-actions-edit" class="modal-actions-edit" style="display:none;">
      <button class="btn-delete" onclick="deleteTransaction()">削除する</button>
      <div style="display:flex;gap:10px;">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-save" onclick="updateTransaction()">更新する</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== データ =====
  const categories = {
    expense: ['食費','交通費','娯楽費','日用品','医療費','光熱費','通信費','その他'],
    income:  ['給与','副業','その他']
  };

  let transactions = [
    { id:1,  type:'income',  category:'給与',  amount:200000, date:'2026-05-01', memo:'5月分' },
    { id:2,  type:'expense', category:'食費',  amount:3800,   date:'2026-05-02', memo:'スーパー' },
    { id:3,  type:'expense', category:'交通費',amount:2400,   date:'2026-05-03', memo:'定期代' },
    { id:4,  type:'expense', category:'娯楽費',amount:4500,   date:'2026-05-04', memo:'映画' },
    { id:5,  type:'expense', category:'食費',  amount:1200,   date:'2026-05-08', memo:'ランチ' },
    { id:6,  type:'expense', category:'食費',  amount:980,    date:'2026-05-08', memo:'コンビニ' },
    { id:7,  type:'expense', category:'日用品',amount:2100,   date:'2026-05-10', memo:'洗剤など' },
    { id:8,  type:'expense', category:'娯楽費',amount:6200,   date:'2026-05-15', memo:'書籍' },
    { id:9,  type:'expense', category:'光熱費',amount:7800,   date:'2026-04-25', memo:'電気代' },
    { id:10, type:'income',  category:'副業',  amount:30000,  date:'2026-04-20', memo:'フリーランス' },
    { id:11, type:'expense', category:'食費',  amount:5600,   date:'2026-04-15', memo:'外食' },
    { id:12, type:'expense', category:'通信費',amount:4200,   date:'2026-03-10', memo:'スマホ代' },
    { id:13, type:'income',  category:'給与',  amount:200000, date:'2026-03-01', memo:'3月分' },
  ];

  let nextId = 14;
  let currentYear  = 2026;
  let currentMonth = 5;
  let selectedDay  = null;   // カレンダー選択日（null = 月全体）
  let editingId    = null;
  let pieChartInstance = null;
  let barChartInstance = null;

  // ===== 電卓ステート =====
  let calcBuf    = '0';   // 現在入力中の数値文字列
  let calcLeft   = null;  // 左辺の値
  let calcOper   = null;  // 演算子
  let calcJustEq = false; // = 直後フラグ

  // ===== 画面遷移 =====
  function goTo(page) {
    ['login','signup','home','reports','categories'].forEach(p => {
      document.getElementById('page-' + p)?.classList.remove('active');
    });
    const nav = document.getElementById('main-nav');
    if (['login','signup'].includes(page)) {
      nav.style.display = 'none';
    } else {
      nav.style.display = 'flex';
      ['home','reports','categories'].forEach(p => {
        document.getElementById('nav-' + p)?.classList.remove('active');
      });
      document.getElementById('nav-' + page)?.classList.add('active');
    }
    document.getElementById('page-' + page)?.classList.add('active');
    if (page === 'home')       renderHome();
    if (page === 'reports')    renderReports();
    if (page === 'categories') renderCategories();
  }

  // ===== 月操作 =====
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    selectedDay = null;
    renderHome();
    syncReportMonth();
  }

  function syncReportMonth() {
    const el = document.getElementById('report-month-label');
    if (el) el.textContent = currentYear + '年' + currentMonth + '月';
  }

  // ===== カレンダー =====
  function renderCalendar() {
    document.getElementById('cal-header').textContent = currentYear + '年' + currentMonth + '月';

    const daysInMonth  = new Date(currentYear, currentMonth, 0).getDate();
    const firstDow     = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInPrev   = new Date(currentYear, currentMonth - 1, 0).getDate();
    const today        = new Date();

    // 収支がある日のセット
    const activeDays = new Set(
      transactions
        .filter(t => {
          const d = new Date(t.date);
          return d.getFullYear() === currentYear && (d.getMonth() + 1) === currentMonth;
        })
        .map(t => new Date(t.date).getDate())
    );

    let html = '';
    let cell = 0;

    // 前月の余白
    for (let i = firstDow - 1; i >= 0; i--) {
      const d = daysInPrev - i;
      html += `<div class="cal-day other-month">${d}</div>`;
      cell++;
    }

    // 当月
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = (firstDow + d - 1) % 7;
      let cls = 'cal-day';
      if (dow === 0) cls += ' sun';
      if (dow === 6) cls += ' sat';
      if (today.getFullYear() === currentYear && (today.getMonth()+1) === currentMonth && today.getDate() === d) cls += ' today';
      if (activeDays.has(d)) cls += ' has-data';
      if (selectedDay === d) cls += ' selected';
      html += `<div class="${cls}" onclick="selectDay(${d})">${d}</div>`;
      cell++;
    }

    // 翌月の余白
    let next = 1;
    while (cell % 7 !== 0) {
      html += `<div class="cal-day other-month">${next++}</div>`;
      cell++;
    }

    document.getElementById('cal-days').innerHTML = html;
  }

  function selectDay(d) {
    selectedDay = (selectedDay === d) ? null : d;
    renderHome();
  }

  function clearDayFilter() {
    selectedDay = null;
    renderHome();
  }

  // ===== ホーム画面 =====
  function renderHome() {
    document.getElementById('month-label').textContent = currentYear + '年' + currentMonth + '月';
    renderCalendar();

    // 月全体でサマリー計算
    const monthly = transactions.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === currentYear && (d.getMonth() + 1) === currentMonth;
    });
    const income  = monthly.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = monthly.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    document.getElementById('summary-income').textContent  = '¥' + income.toLocaleString();
    document.getElementById('summary-expense').textContent = '¥' + expense.toLocaleString();
    document.getElementById('summary-balance').textContent = '¥' + (income - expense).toLocaleString();

    // 一覧：日付フィルター適用
    let filtered = monthly;
    const clearBadge = document.getElementById('day-filter-clear');
    const listTitle  = document.getElementById('list-title');

    if (selectedDay !== null) {
      const pad = String(selectedDay).padStart(2, '0');
      const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${pad}`;
      filtered = monthly.filter(t => t.date === dateStr);
      listTitle.textContent = currentMonth + '月' + selectedDay + '日の収支';
      clearBadge.style.display = 'inline-block';
    } else {
      listTitle.textContent = currentYear + '年' + currentMonth + '月の収支一覧';
      clearBadge.style.display = 'none';
    }
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

    const tbody = document.getElementById('transaction-list');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#aaa;">この期間の収支データはありません</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(t => {
      const d = new Date(t.date);
      const dateStr = (d.getMonth()+1) + '/' + d.getDate();
      const typeLabel = t.type === 'income' ? '収入' : '支出';
      const amountStr = (t.type === 'income' ? '+' : '−') + '¥' + t.amount.toLocaleString();
      return `<tr onclick="openEditModal(${t.id})">
        <td>${dateStr}</td>
        <td><span class="badge ${t.type}">${typeLabel}</span></td>
        <td>${t.category}</td>
        <td class="amount-cell ${t.type}">${amountStr}</td>
        <td style="color:#aaa">${t.memo || ''}</td>
      </tr>`;
    }).join('');
  }

  // ===== 電卓ロジック =====
  function calcRender() {
    const display = parseFloat(calcBuf).toLocaleString();
    document.getElementById('calc-result').textContent = calcBuf === '' ? '0' : display;
    let expr = '';
    if (calcLeft !== null && calcOper) {
      expr = parseFloat(calcLeft).toLocaleString() + ' ' + calcOper;
    }
    document.getElementById('calc-expr').textContent = expr;
    document.getElementById('amount-display').textContent =
      calcBuf === '' || calcBuf === '0' ? '0' : parseFloat(calcBuf).toLocaleString();
  }

  function calcNum(n) {
    if (calcJustEq) { calcBuf = '0'; calcLeft = null; calcOper = null; calcJustEq = false; }
    if (calcBuf === '0') {
      calcBuf = n === '00' ? '0' : n;
    } else {
      if (calcBuf.replace('-','').length >= 9) return;
      calcBuf += n;
    }
    calcRender();
  }

  function calcOp(op) {
    calcJustEq = false;
    if (calcLeft !== null && calcOper && calcBuf !== '') {
      calcEqual(true);
    }
    calcLeft = calcBuf;
    calcOper = op;
    calcBuf  = '0';
    calcRender();
  }

  function calcEqual(internal = false) {
    if (calcLeft === null || !calcOper) return;
    const l = parseFloat(calcLeft);
    const r = parseFloat(calcBuf);
    let result = 0;
    if (calcOper === '+')  result = l + r;
    if (calcOper === '−') result = l - r;
    if (calcOper === '×') result = l * r;
    if (calcOper === '÷') result = r !== 0 ? l / r : 0;
    if (calcOper === '%')  result = l * (r / 100);
    result = Math.round(result);
    calcBuf  = String(result);
    calcLeft = null;
    calcOper = null;
    if (!internal) calcJustEq = true;
    calcRender();
  }

  function calcClear() {
    calcBuf = '0'; calcLeft = null; calcOper = null; calcJustEq = false;
    calcRender();
  }

  function calcBack() {
    if (calcBuf.length <= 1) { calcBuf = '0'; }
    else { calcBuf = calcBuf.slice(0, -1); }
    calcRender();
  }

  function toggleCalc() {
    const calc = document.getElementById('calculator');
    const disp = document.getElementById('amount-display');
    const isOpen = calc.classList.toggle('open');
    disp.classList.toggle('open', isOpen);
  }

  function confirmAmount() {
    document.getElementById('calculator').classList.remove('open');
    document.getElementById('amount-display').classList.remove('open');
  }

  function getAmount() {
    const val = parseInt(calcBuf);
    return isNaN(val) ? 0 : val;
  }

  function setAmount(val) {
    calcBuf = String(val);
    calcLeft = null; calcOper = null; calcJustEq = false;
    calcRender();
  }

  // ===== モーダル =====
  function updateCategoryOptions() {
    const type = document.querySelector('input[name="type"]:checked').value;
    const sel = document.getElementById('input-category');
    sel.innerHTML = categories[type].map(c => `<option>${c}</option>`).join('');
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = '収支を登録する';
    document.getElementById('radio-expense').checked = true;
    document.getElementById('input-memo').value = '';

    // 日付：選択日があればその日、なければ今日
    if (selectedDay !== null) {
      const m = String(currentMonth).padStart(2,'0');
      const d = String(selectedDay).padStart(2,'0');
      document.getElementById('input-date').value = `${currentYear}-${m}-${d}`;
    } else {
      document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
    }

    setAmount(0);
    updateCategoryOptions();
    document.getElementById('modal-actions-add').style.display = 'flex';
    document.getElementById('modal-actions-edit').style.display = 'none';
    document.getElementById('calculator').classList.remove('open');
    document.getElementById('modal-overlay').classList.add('active');
  }

  function openEditModal(id) {
    editingId = id;
    const t = transactions.find(x => x.id === id);
    document.getElementById('modal-title').textContent = '収支を編集する';
    document.getElementById(t.type === 'income' ? 'radio-income' : 'radio-expense').checked = true;
    updateCategoryOptions();
    setAmount(t.amount);
    document.getElementById('input-date').value = t.date;
    document.getElementById('input-memo').value = t.memo;
    const sel = document.getElementById('input-category');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].text === t.category) { sel.selectedIndex = i; break; }
    }
    document.getElementById('modal-actions-add').style.display = 'none';
    document.getElementById('modal-actions-edit').style.display = 'flex';
    document.getElementById('calculator').classList.remove('open');
    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('calculator').classList.remove('open');
  }

  function saveTransaction() {
    const type     = document.querySelector('input[name="type"]:checked').value;
    const amount   = getAmount();
    const category = document.getElementById('input-category').value;
    const date     = document.getElementById('input-date').value;
    const memo     = document.getElementById('input-memo').value;
    if (!amount || !date || !category) { alert('金額・日付・カテゴリは必須です'); return; }
    transactions.push({ id: nextId++, type, category, amount, date, memo });
    closeModal();
    renderHome();
  }

  function updateTransaction() {
    const type     = document.querySelector('input[name="type"]:checked').value;
    const amount   = getAmount();
    const category = document.getElementById('input-category').value;
    const date     = document.getElementById('input-date').value;
    const memo     = document.getElementById('input-memo').value;
    if (!amount || !date || !category) { alert('金額・日付・カテゴリは必須です'); return; }
    const idx = transactions.findIndex(t => t.id === editingId);
    transactions[idx] = { id: editingId, type, category, amount, date, memo };
    closeModal();
    renderHome();
  }

  function deleteTransaction() {
    if (!confirm('この収支を削除しますか？')) return;
    transactions = transactions.filter(t => t.id !== editingId);
    closeModal();
    renderHome();
  }

  // ===== レポート =====
  function renderReports() {
    syncReportMonth();
    const filtered = transactions.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === currentYear && (d.getMonth()+1) === currentMonth;
    });

    const expenseByCategory = {};
    filtered.filter(t => t.type === 'expense').forEach(t => {
      expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
    });
    const pieLabels = Object.keys(expenseByCategory);
    const pieData   = Object.values(expenseByCategory);
    const pieColors = ['#3a7bd5','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#95a5a6'];

    if (pieChartInstance) pieChartInstance.destroy();
    pieChartInstance = new Chart(document.getElementById('pie-chart'), {
      type: 'doughnut',
      data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors.slice(0, pieLabels.length), borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 12 }, padding: 12 } } } }
    });

    const barLabels = [], barIncome = [], barExpense = [];
    for (let i = 5; i >= 0; i--) {
      let y = currentYear, m = currentMonth - i;
      if (m <= 0) { m += 12; y--; }
      barLabels.push(m + '月');
      const monthly = transactions.filter(t => { const d = new Date(t.date); return d.getFullYear() === y && (d.getMonth()+1) === m; });
      barIncome.push(monthly.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0));
      barExpense.push(monthly.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0));
    }

    if (barChartInstance) barChartInstance.destroy();
    barChartInstance = new Chart(document.getElementById('bar-chart'), {
      type: 'bar',
      data: { labels: barLabels, datasets: [
        { label: '収入', data: barIncome,  backgroundColor: 'rgba(46,204,113,0.7)' },
        { label: '支出', data: barExpense, backgroundColor: 'rgba(231,76,60,0.7)' }
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } },
        scales: { y: { ticks: { callback: v => '¥' + v.toLocaleString() } } } }
    });
  }

  // ===== カテゴリ管理 =====
  function renderCategories() {
    ['expense','income'].forEach(type => {
      const list = document.getElementById(type + '-category-list');
      list.innerHTML = categories[type].map((c, i) => `
        <div class="category-item">
          <span>${c}</span>
          <div class="category-actions">
            <button class="btn-sm edit" onclick="editCategory('${type}', ${i})">編集</button>
            <button class="btn-sm del"  onclick="deleteCategory('${type}', ${i})">削除</button>
          </div>
        </div>
      `).join('') + `
        <div class="category-add">
          <input type="text" id="new-${type}-category" placeholder="新しいカテゴリ名">
          <button onclick="addCategory('${type}')">追加</button>
        </div>
      `;
    });
  }

  function addCategory(type) {
    const input = document.getElementById('new-' + type + '-category');
    const name = input.value.trim();
    if (!name) return;
    if (categories[type].includes(name)) { alert('同じ名前のカテゴリが既に存在します'); return; }
    categories[type].push(name);
    input.value = '';
    renderCategories();
  }

  function editCategory(type, index) {
    const newName = prompt('カテゴリ名を変更する', categories[type][index]);
    if (!newName || !newName.trim()) return;
    categories[type][index] = newName.trim();
    renderCategories();
  }

  function deleteCategory(type, index) {
    if (!confirm('「' + categories[type][index] + '」を削除しますか？')) return;
    categories[type].splice(index, 1);
    renderCategories();
  }

  // ===== モーダル外クリックで閉じる =====
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ===== 初期化 =====
  goTo('login');
</script>
</body>
</html>
