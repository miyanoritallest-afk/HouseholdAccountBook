name: PRからIssueを自動作成

on:
  pull_request:
    types: [opened]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: PRの情報からIssueを作成
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: pr.title,
              body: `## 関連PR\n\n#${pr.number} ${pr.title}\n\n## PR概要\n\n${pr.body ?? '（説明なし）'}`,
              labels: ['from-pr'],
            });

            console.log(`Issue #${issue.data.number} を作成しました: ${issue.data.html_url}`);

            // 作成したIssue番号をPRにコメントする
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `このPRに対応するIssueを自動作成しました: #${issue.data.number}`,
            });
